name: Build SRProbe unsigned IPA

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: "Xcode scheme, leave empty for auto-detect"
        required: false
        default: ""

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Detect project and scheme
        id: detect
        run: |
          set -e

          WORKSPACE=$(find . -maxdepth 2 -name "*.xcworkspace" | head -n 1 || true)
          PROJECT=$(find . -maxdepth 2 -name "*.xcodeproj" | head -n 1 || true)

          if [ -n "$WORKSPACE" ]; then
            echo "kind=workspace" >> "$GITHUB_OUTPUT"
            echo "path=$WORKSPACE" >> "$GITHUB_OUTPUT"
            LIST_CMD="xcodebuild -workspace $WORKSPACE -list"
          elif [ -n "$PROJECT" ]; then
            echo "kind=project" >> "$GITHUB_OUTPUT"
            echo "path=$PROJECT" >> "$GITHUB_OUTPUT"
            LIST_CMD="xcodebuild -project $PROJECT -list"
          else
            echo "No .xcodeproj or .xcworkspace found"
            find . -maxdepth 3 -type f | sort
            exit 1
          fi

          if [ -n "${{ github.event.inputs.scheme }}" ]; then
            SCHEME="${{ github.event.inputs.scheme }}"
          else
            SCHEME=$($LIST_CMD 2>/dev/null | awk '/Schemes:/{flag=1; next} flag && NF {print $1; exit}')
          fi

          if [ -z "$SCHEME" ]; then
            echo "Could not detect scheme"
            $LIST_CMD
            exit 1
          fi

          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Detected project/workspace: $WORKSPACE$PROJECT"
          echo "Detected scheme: $SCHEME"

      - name: Build unsigned app
        run: |
          set -e

          BUILD_DIR="$PWD/build-output"

          COMMON_FLAGS=(
            -configuration Release
            -sdk iphoneos
            -derivedDataPath "$BUILD_DIR"
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGN_IDENTITY=""
            OTHER_LDFLAGS="-framework UIKit -framework Foundation -framework CoreGraphics"
          )

          if [ "${{ steps.detect.outputs.kind }}" = "workspace" ]; then
            xcodebuild \
              -workspace "${{ steps.detect.outputs.path }}" \
              -scheme "${{ steps.detect.outputs.scheme }}" \
              "${COMMON_FLAGS[@]}" \
              clean build
          else
            xcodebuild \
              -project "${{ steps.detect.outputs.path }}" \
              -scheme "${{ steps.detect.outputs.scheme }}" \
              "${COMMON_FLAGS[@]}" \
              clean build
          fi

      - name: Package unsigned IPA
        run: |
          set -e

          APP_PATH=$(find "$PWD/build-output" -path "*/Build/Products/Release-iphoneos/*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            find "$PWD/build-output" -maxdepth 8 -type d | sort
            exit 1
          fi

          echo "Found app: $APP_PATH"

          rm -rf Payload SRProbe-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/

          /usr/bin/zip -r SRProbe-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SRProbe-unsigned-ipa
          path: SRProbe-unsigned.ipa
