name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Xcode scheme (optional — auto-detect if empty)'
        required: false
      export_method:
        description: 'Export method: app-store, ad-hoc, enterprise, development'
        required: false
        default: 'ad-hoc'

jobs:
  build:
    runs-on: macos-latest
    env:
      EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
      INPUT_SCHEME: ${{ github.event.inputs.scheme }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CocoaPods if needed
        run: |
          if [ -f Podfile ]; then
            sudo gem install cocoapods --no-document || true
            pod install || true
          fi

      - name: Install certificate (if provided)
        if: ${{ secrets.P12_BASE64 != '' }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security import cert.p12 -k ~/Library/Keychains/build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign || true
          security list-keychains -s ~/Library/Keychains/build.keychain
          security default-keychain -s ~/Library/Keychains/build.keychain
          security unlock-keychain -p actions ~/Library/Keychains/build.keychain
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile (if provided)
        if: ${{ secrets.PROFILE_BASE64 != '' }}
        run: |
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
        env:
          PROFILE_BASE64: ${{ secrets.PROFILE_BASE64 }}

      - name: Detect project / workspace and scheme
        id: detect
        run: |
          set -e
          # find workspace or project
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -n1 || true)
          PROJECT=$(ls *.xcodeproj 2>/dev/null | head -n1 || true)
          if [ -n "$WORKSPACE" ]; then
            echo "project_path=$WORKSPACE" >> $GITHUB_OUTPUT
            BUILD_FLAG="-workspace $WORKSPACE"
          elif [ -n "$PROJECT" ]; then
            echo "project_path=$PROJECT" >> $GITHUB_OUTPUT
            BUILD_FLAG="-project $PROJECT"
          else
            echo "No .xcworkspace or .xcodeproj found in repo root" >&2
            exit 1
          fi

          # scheme: prefer input, otherwise try to detect
          if [ -n "$INPUT_SCHEME" ]; then
            SCHEME="$INPUT_SCHEME"
          else
            if [ -n "$WORKSPACE" ]; then
              SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -quiet 2>/dev/null | sed -n '/Schemes:/,/^$/p' | tail -n +2 | head -n1 || true)
            else
              SCHEME=$(xcodebuild -project "$PROJECT" -list -quiet 2>/dev/null | sed -n '/Schemes:/,/^$/p' | tail -n +2 | head -n1 || true)
            fi
          fi
          if [ -z "$SCHEME" ]; then echo "Could not detect scheme; provide scheme as workflow input" >&2; exit 1; fi
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Archive (xcodebuild)
        run: |
          set -e
          ARCHIVE_PATH="$PWD/build/${{ steps.detect.outputs.scheme }}.xcarchive"
          mkdir -p $(dirname "$ARCHIVE_PATH")
          if [ -n "$(echo '${{ steps.detect.outputs.project_path }}' | grep .xcworkspace || true)" ]; then
            xcodebuild -workspace "${{ steps.detect.outputs.project_path }}" -scheme "${{ steps.detect.outputs.scheme }}" -configuration Release -archivePath "$ARCHIVE_PATH" clean archive | xcpretty || true
          else
            xcodebuild -project "${{ steps.detect.outputs.project_path }}" -scheme "${{ steps.detect.outputs.scheme }}" -configuration Release -archivePath "$ARCHIVE_PATH" clean archive | xcpretty || true
          fi

      - name: Create exportOptions.plist
        run: |
          python3 << 'PYEOF'
          import plistlib
          export_options = {
              'method': '${{ env.EXPORT_METHOD }}',
              'compileBitcode': False,
              'signingStyle': 'automatic',
          }
          with open('exportOptions.plist', 'wb') as f:
              plistlib.dump(export_options, f)
          PYEOF

      - name: Export IPA
        run: |
          set -e
          ARCHIVE_PATH="$PWD/build/${{ steps.detect.outputs.scheme }}.xcarchive"
          EXPORT_DIR="$PWD/output"
          mkdir -p "$EXPORT_DIR"
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportOptionsPlist exportOptions.plist -exportPath "$EXPORT_DIR" | xcpretty || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa-output
          path: output/*.ipa
